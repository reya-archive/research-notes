# ==============================================================================
# 호스트 Ollama 연결용 overlay
# ==============================================================================
# 이 overlay 는 Bedrock 기본 구성에 덧붙여 Dify 의 api / worker 컨테이너가
# 호스트에서 네이티브 실행 중인 Ollama(11434) 에 접근할 수 있도록 DNS 매핑만
# 추가합니다.
#
# Ollama 프로바이더는 Dify 웹 UI 에서 등록하며, LLM(gemma4:26b 등) 과
# 임베딩(bge-m3) 을 같은 Ollama 인스턴스에서 모두 불러 씁니다.
#
# 사용 예:
#   docker compose \
#     -f dify/docker/docker-compose.yaml \
#     -f compose.ollama.yml \
#     --env-file .env \
#     up -d
#
# (setup.sh --with-ollama 실행 시 자동 포함)
#
# 사전 조건:
#   - 호스트 Ollama 는 OLLAMA_HOST=0.0.0.0:11434 로 리슨해야 함
#     (기본 127.0.0.1 만 리슨 시 컨테이너에서 접근 불가)
#   - `ollama list` 에 gemma4:26b, bge-m3 등 필요한 모델이 내려받아져 있어야 함
# ==============================================================================

services:
  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"
